name: Deploy to Azure App Services

env:
  UI_RESOURCE_GROUP: ${{ vars.UI_RESOURCE_GROUP || 'pre-reg-spike-rg' }}
  API_RESOURCE_GROUP: ${{ vars.API_RESOURCE_GROUP || 'pre-reg-spike-api_group' }}

  DEV_UI_APP_NAME: ${{ vars.DEV_UI_APP_NAME || 'pre-reg-spike-ui-dev' }}
  DEV_UI_URL: ${{ vars.DEV_UI_URL || 'https://pre-reg-spike-ui-dev-cubfdca4c7ftfqeq.canadacentral-01.azurewebsites.net' }}
  DEV_API_APP_NAME: ${{ vars.DEV_API_APP_NAME || 'pre-reg-spike-api-dev' }}
  DEV_API_URL: ${{ vars.DEV_API_URL || 'https://pre-reg-spike-api-dev-gtadf8hrdme8c5ey.canadacentral-01.azurewebsites.net' }}

  PROD_UI_APP_NAME: ${{ vars.PROD_UI_APP_NAME || 'pre-reg-spike-ui' }}
  PROD_UI_URL: ${{ vars.PROD_UI_URL || 'https://pre-reg-spike-ui-f3hghrcse9gme5ge.canadacentral-01.azurewebsites.net' }}
  PROD_API_APP_NAME: ${{ vars.PROD_API_APP_NAME || 'pre-reg-spike-api' }}
  PROD_API_URL: ${{ vars.PROD_API_URL || 'https://pre-reg-spike-api-gncmescydpgebuhj.canadacentral-01.azurewebsites.net' }}

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build/deploy (branch, tag, or SHA)'
        required: true
        default: 'main'
      environment:
        description: 'Target environment (manual runs only)'
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prod
      deploy:
        description: 'What to deploy (manual runs only)'
        required: true
        type: choice
        default: 'none'
        options:
          - none
          - ui
          - api
          - both

jobs:
  set-target:
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.set.outputs.target_env }}
      ui_app_name: ${{ steps.set.outputs.ui_app_name }}
      ui_url: ${{ steps.set.outputs.ui_url }}
      ui_resource_group: ${{ steps.set.outputs.ui_resource_group }}
      api_app_name: ${{ steps.set.outputs.api_app_name }}
      api_url: ${{ steps.set.outputs.api_url }}
      api_resource_group: ${{ steps.set.outputs.api_resource_group }}
      deploy_ui: ${{ steps.set.outputs.deploy_ui }}
      deploy_api: ${{ steps.set.outputs.deploy_api }}
    steps:
      - id: set
        name: Select target environment
        shell: bash
        run: |
          set -euo pipefail

          TARGET_ENV="dev"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ inputs.environment }}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TARGET_ENV="dev"
          else
            # Build-only runs (PRs / non-main pushes): default to dev settings.
            TARGET_ENV="dev"
          fi

          if [ "${TARGET_ENV}" = "prod" ]; then
            UI_APP_NAME="${PROD_UI_APP_NAME}"
            UI_URL="${PROD_UI_URL}"
            API_APP_NAME="${PROD_API_APP_NAME}"
            API_URL="${PROD_API_URL}"
          else
            UI_APP_NAME="${DEV_UI_APP_NAME}"
            UI_URL="${DEV_UI_URL}"
            API_APP_NAME="${DEV_API_APP_NAME}"
            API_URL="${DEV_API_URL}"
          fi

          DEPLOY_UI="false"
          DEPLOY_API="false"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            DEPLOY_UI="true"
            DEPLOY_API="true"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${{ inputs.deploy }}" in
              ui)
                DEPLOY_UI="true";;
              api)
                DEPLOY_API="true";;
              both)
                DEPLOY_UI="true"; DEPLOY_API="true";;
              none)
                ;; 
            esac
          fi

          echo "target_env=${TARGET_ENV}" >> "${GITHUB_OUTPUT}"
          echo "ui_app_name=${UI_APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "ui_url=${UI_URL}" >> "${GITHUB_OUTPUT}"
          echo "ui_resource_group=${UI_RESOURCE_GROUP}" >> "${GITHUB_OUTPUT}"
          echo "api_app_name=${API_APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "api_url=${API_URL}" >> "${GITHUB_OUTPUT}"
          echo "api_resource_group=${API_RESOURCE_GROUP}" >> "${GITHUB_OUTPUT}"
          echo "deploy_ui=${DEPLOY_UI}" >> "${GITHUB_OUTPUT}"
          echo "deploy_api=${DEPLOY_API}" >> "${GITHUB_OUTPUT}"

  build-ui:
    needs: set-target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --force

      - name: Compute build metadata
        run: |
          VERSION=$(node -e "const n=Number(process.env.GITHUB_RUN_NUMBER||1); console.log((1 + (n-1)/10).toFixed(1))")
          SHA=$(git rev-parse HEAD)
          echo "VITE_BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "VITE_BUILD_SHA=${SHA}" >> $GITHUB_ENV
          echo "VITE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build UI
        run: npm run build
        env:
          VITE_API_URL: ${{ needs.set-target.outputs.api_url }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_BUILD_VERSION: ${{ env.VITE_BUILD_VERSION }}
          VITE_BUILD_SHA: ${{ env.VITE_BUILD_SHA }}
          VITE_BUILD_TIME: ${{ env.VITE_BUILD_TIME }}

      - name: Write build marker
        run: |
          echo "version=${{ env.VITE_BUILD_VERSION }}" > dist/build-info.txt
          echo "sha=${{ env.VITE_BUILD_SHA }}" >> dist/build-info.txt
          echo "time=${{ env.VITE_BUILD_TIME }}" >> dist/build-info.txt

      - name: Upload UI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: dist/
          retention-days: 1

  build-api:
    needs: set-target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
      - name: Compile API
        run: npx tsc -p tsconfig.api.json --noEmit false

      - name: Upload API artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: |
            *.js
            shared/
            errors/
            validations/
            prisma/
            prisma.config.ts
          retention-days: 1

  deploy-ui:
    needs: [set-target, build-ui]
    runs-on: ubuntu-latest
    if: ${{ needs.set-target.outputs.deploy_ui == 'true' }}
    environment: ${{ needs.set-target.outputs.target_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Download UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: ui-build
          path: ./wwwroot

      - name: Create UI startup + static server
        run: |
          cat > ./wwwroot/startup.sh << 'EOF'
          #!/bin/bash
          set -e
          export PORT=${PORT:-${WEBSITES_PORT:-8080}}
          node /home/site/wwwroot/server.mjs
          EOF
          chmod +x ./wwwroot/startup.sh

          cat > ./wwwroot/server.mjs << 'EOF'
          import http from 'node:http'
          import fs from 'node:fs'
          import path from 'node:path'
          import { fileURLToPath } from 'node:url'

          const __filename = fileURLToPath(import.meta.url)
          const __dirname = path.dirname(__filename)
          const root = __dirname
          const port = Number(process.env.PORT || 8080)

          const mime = {
            '.html': 'text/html; charset=utf-8',
            '.js': 'text/javascript; charset=utf-8',
            '.css': 'text/css; charset=utf-8',
            '.json': 'application/json; charset=utf-8',
            '.svg': 'image/svg+xml',
            '.png': 'image/png',
            '.jpg': 'image/jpeg',
            '.jpeg': 'image/jpeg',
            '.ico': 'image/x-icon',
            '.txt': 'text/plain; charset=utf-8',
            '.map': 'application/json; charset=utf-8',
            '.woff': 'font/woff',
            '.woff2': 'font/woff2',
          }

          function sendFile(res, filePath) {
            const ext = path.extname(filePath).toLowerCase()
            res.statusCode = 200
            res.setHeader('Content-Type', mime[ext] || 'application/octet-stream')

            // Avoid stale HTML causing old hashed assets to be referenced
            if (ext === '.html') {
              res.setHeader('Cache-Control', 'no-store, no-cache, must-revalidate, proxy-revalidate')
              res.setHeader('Pragma', 'no-cache')
              res.setHeader('Expires', '0')
            } else if (filePath.includes('/assets/')) {
              // Fingerprinted assets are safe to cache
              res.setHeader('Cache-Control', 'public, max-age=31536000, immutable')
            }

            fs.createReadStream(filePath).pipe(res)
          }

          const server = http.createServer((req, res) => {
            const url = new URL(req.url || '/', `http://${req.headers.host || 'localhost'}`)
            const pathname = decodeURIComponent(url.pathname)

            // Basic hardening
            if (pathname.includes('..')) {
              res.statusCode = 400
              res.end('Bad request')
              return
            }

            let filePath = path.join(root, pathname)
            if (pathname === '/' || pathname === '') {
              filePath = path.join(root, 'index.html')
            }

            fs.stat(filePath, (err, stats) => {
              if (!err && stats.isFile()) {
                sendFile(res, filePath)
                return
              }

              // SPA fallback
              const indexPath = path.join(root, 'index.html')
              fs.stat(indexPath, (indexErr, indexStats) => {
                if (!indexErr && indexStats.isFile()) {
                  sendFile(res, indexPath)
                } else {
                  res.statusCode = 404
                  res.end('Not found')
                }
              })
            })
          })

          server.listen(port, '0.0.0.0', () => {
            console.log(`Static UI server listening on ${port}`)
          })
          EOF

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","subscriptionId":"{2}","tenantId":"{3}"}}', secrets.AZURE_CLIENT_ID, secrets.AZURE_CLIENT_SECRET, secrets.AZURE_SUBSCRIPTION_ID, secrets.AZURE_TENANT_ID) }}

      - name: Deploy UI to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.set-target.outputs.ui_app_name }}
          package: ./wwwroot
          clean: true

      - name: Configure UI App Settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ needs.set-target.outputs.ui_resource_group }}" \
            --name "${{ needs.set-target.outputs.ui_app_name }}" \
            --settings \
            VITE_API_KEY="${{ secrets.VITE_API_KEY }}" \
            VITE_API_URL="${{ needs.set-target.outputs.api_url }}" \
            API_SERVER="${{ needs.set-target.outputs.api_url }}" \
            WEBSITES_PORT=8080
          
          az webapp config set --resource-group "${{ needs.set-target.outputs.ui_resource_group }}" --name "${{ needs.set-target.outputs.ui_app_name }}" --startup-file "bash /home/site/wwwroot/startup.sh"

  deploy-api:
    needs: [set-target, build-api]
    runs-on: ubuntu-latest
    if: ${{ needs.set-target.outputs.deploy_api == 'true' }}
    environment: ${{ needs.set-target.outputs.target_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download API artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: ./api-deploy

      - name: Force API package to CommonJS
        run: |
          cat > ./api-deploy/package.json << 'EOF'
          {
            "name": "pre-reg-spike-api",
            "private": true,
            "type": "commonjs",
            "main": "api-server.js",
            "scripts": {
              "start": "node api-server.js",
              "postinstall": "prisma generate --schema prisma/schema.prisma"
            },
            "dependencies": {
              "@prisma/adapter-pg": "7.3.0",
              "@prisma/client": "7.3.0",
              "cors": "^2.8.5",
              "dotenv": "^16.4.5",
              "express": "^5.1.0",
              "pg": "8.18.0",
              "prisma": "7.3.0",
              "valibot": "^1.2.0"
            }
          }
          EOF

      - name: Install API deps
        run: |
          cd ./api-deploy
          npm install --omit=dev --no-audit --no-fund --ignore-scripts

      - name: Prisma migrate deploy + generate client
        working-directory: ./api-deploy
        env:
          DATABASE_URL: ${{ needs.set-target.outputs.target_env == 'prod' && secrets.DATABASE_URL || secrets.DATABASE_URL_DEV }}
        run: |
          npx prisma migrate deploy --schema prisma/schema.prisma
          npx prisma generate --schema prisma/schema.prisma

      - name: Create startup script
        run: |
          mkdir -p ./api-deploy
          cat > ./api-deploy/startup.sh << 'EOF'
          #!/bin/bash
          export PORT=${WEBSITES_PORT:-8080}
          cd /home/site/wwwroot
          node api-server.js
          EOF
          chmod +x ./api-deploy/startup.sh

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ format('{{"clientId":"{0}","clientSecret":"{1}","subscriptionId":"{2}","tenantId":"{3}"}}', secrets.AZURE_CLIENT_ID, secrets.AZURE_CLIENT_SECRET, secrets.AZURE_SUBSCRIPTION_ID, secrets.AZURE_TENANT_ID) }}

      - name: Ensure API uses Node runtime (not container)
        run: |
          CURRENT=$(az webapp config show --resource-group "${{ needs.set-target.outputs.api_resource_group }}" --name "${{ needs.set-target.outputs.api_app_name }}" --query linuxFxVersion -o tsv)
          echo "Current linuxFxVersion: ${CURRENT}"
          if [ "${CURRENT}" != "NODE|22-lts" ]; then
            az webapp config set \
              --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
              --name "${{ needs.set-target.outputs.api_app_name }}" \
              --linux-fx-version "NODE|22-lts"
            sleep 20
          fi

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.set-target.outputs.api_app_name }}
          package: ./api-deploy

      - name: Configure API App Settings
        run: |
          az webapp config appsettings delete \
            --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
            --name "${{ needs.set-target.outputs.api_app_name }}" \
            --setting-names SCM_DO_BUILD_DURING_DEPLOYMENT || true

          az webapp config appsettings set \
            --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
            --name "${{ needs.set-target.outputs.api_app_name }}" \
            --settings \
            DATABASE_URL="${{ needs.set-target.outputs.target_env == 'prod' && secrets.DATABASE_URL || secrets.DATABASE_URL_DEV }}" \
            API_KEY="${{ secrets.API_KEY }}" \
            CORS_ORIGINS="${{ needs.set-target.outputs.ui_url }}" \
            WEBSITES_PORT=8080 \
            NODE_OPTIONS="--dns-result-order=ipv4first" \
            WEBSITE_RUN_FROM_PACKAGE=1

          az webapp config set \
            --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
            --name "${{ needs.set-target.outputs.api_app_name }}" \
            --startup-file "bash /home/site/wwwroot/startup.sh" \
            --always-on true

          az webapp config set \
            --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
            --name "${{ needs.set-target.outputs.api_app_name }}" \
            --health-check-path "/ping" || true

      - name: Restart API to pick up new settings
        run: |
          az webapp restart \
            --resource-group "${{ needs.set-target.outputs.api_resource_group }}" \
            --name "${{ needs.set-target.outputs.api_app_name }}"
          sleep 30
